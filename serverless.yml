# ==============================================================
# Allsvenskan Predictor - Serverless Framework Configuration
#
# Infrastruktur och deployment-konfiguration för hela projektet.
# Deployar till AWS med DynamoDB, Lambda, API Gateway, EventBridge.
#
# Deploy: npx serverless deploy
# Remove: npx serverless remove
# ==============================================================

# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: sarapersson
# "service" is the name of this project. This will also be added to your AWS resource names.
service: allsvenskan-predictor

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-north-1
  stage: ${opt:stage, 'dev'}  # Kan overridas med --stage prod
  timeout: 10                  # Default timeout för alla Lambdas (sekunder)
  memorySize: 256              # Default minne för alla Lambdas (MB)

  httpApi:
    cors:
      allowedOrigins:
        - "http://localhost:8081"
        - "http://localhost:19006"
        # TODO: Add production domain when deploying web build
      allowedHeaders:
        - Content-Type
        - x-api-key
      allowedMethods:
        - GET
        - POST
        - OPTIONS
    authorizers:
      apiKeyAuthorizer:
        type: request
        functionName: authorizer
        enableSimpleResponses: true
        payloadVersion: "2.0"
        identitySource: $request.header.x-api-key

  environment:
    MATCHES_TABLE: ${self:service}-matches-${self:provider.stage}
    PREDICTIONS_TABLE: ${self:service}-predictions-${self:provider.stage}

  iam:
    role:
      statements:
        # DynamoDB-åtkomst (båda tabellerna)
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:UpdateItem
          Resource:
            - !GetAtt MatchesTable.Arn
            - !Join ["/", [!GetAtt MatchesTable.Arn, "index/*"]]
            - !GetAtt PredictionsTable.Arn
            - !Join ["/", [!GetAtt PredictionsTable.Arn, "index/*"]]
        # EventBridge-åtkomst (begränsad till vår bus)
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/allsvenskan-prediction-bus"
        # SQS-åtkomst för DLQ
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            - !GetAtt LogPredictionDLQ.Arn

custom:
  apiKey: ${ssm:/allsvenskan-predictor/${self:provider.stage}/api-key}

# ==============================================================
# Functions
# ==============================================================

functions:
  # --- Auth ---
  authorizer:
    handler: src/handlers/authorizer.handler
    environment:
      API_KEY: ${self:custom.apiKey}

  # --- API Endpoints ---
  getMatches:
    handler: src/handlers/getMatches.handler
    events:
      - httpApi:
          path: /matches
          method: get
          authorizer:
            name: apiKeyAuthorizer

  createPrediction:
    handler: src/handlers/createPrediction.handler
    events:
      - httpApi:
          path: /predictions
          method: post
          authorizer:
            name: apiKeyAuthorizer

  getPredictions:
    handler: src/handlers/getPredictions.handler
    events:
      - httpApi:
          path: /predictions
          method: get
          authorizer:
            name: apiKeyAuthorizer

  # --- Scheduled Jobs ---
  fetchMatches:
    handler: src/handlers/fetchMatches.handler
    timeout: 90  # Behöver mer tid - hämtar 30 omgångar från externt API med retries
    reservedConcurrency: 1  # Förhindra parallella körningar som kan orsaka dubbletter
    events:
      - schedule:
          rate: rate(2 hours)
          enabled: true
          input:
            mode: "scores"
          description: "Fetch match scores for rounds that need updating"
      - schedule:
          rate: rate(1 day)
          enabled: true
          input:
            mode: "full"
          description: "Full refresh of future rounds to catch date/time changes"

  calculateScores:
    handler: src/handlers/calculateScores.handler
    reservedConcurrency: 1  # Förhindra parallella körningar som kan orsaka dubbletter
    events:
      - eventBridge:
          eventBus: allsvenskan-prediction-bus
          pattern:
            source:
              - "allsvenskan.matches"
            detail-type:
              - "MatchesUpdated"

  # --- Event-driven ---
  logPrediction:
    handler: src/handlers/logPrediction.handler
    maximumRetryAttempts: 2
    onError: !GetAtt LogPredictionDLQ.Arn
    events:
      - eventBridge:
          eventBus: allsvenskan-prediction-bus
          pattern:
            source:
              - "allsvenskan.predictions"
            detail-type:
              - "PredictionCreated"

# ==============================================================
# Resources (CloudFormation)
# ==============================================================

resources:
  Resources:
    # DynamoDB-tabell för matcher
    MatchesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MATCHES_TABLE}
        AttributeDefinitions:
          - AttributeName: matchId
            AttributeType: S
          - AttributeName: round
            AttributeType: S
          - AttributeName: date
            AttributeType: S
        KeySchema:
          - AttributeName: matchId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: round-date-index
            KeySchema:
              - AttributeName: round
                KeyType: HASH
              - AttributeName: date
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    # DynamoDB-tabell för tips
    PredictionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PREDICTIONS_TABLE}
        AttributeDefinitions:
          - AttributeName: predictionId
            AttributeType: S
          - AttributeName: matchId
            AttributeType: S
        KeySchema:
          - AttributeName: predictionId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: matchId-index
            KeySchema:
              - AttributeName: matchId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    # Dead Letter Queue för logPrediction
    LogPredictionDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-log-prediction-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600  # 14 dagar

    # SNS-topic för larm (konfigurera e-post manuellt i AWS Console)
    AlarmTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-alarms-${self:provider.stage}

    # Larm: Lambda-fel (triggas om >= 1 error på 5 min)
    LambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-lambda-errors-${self:provider.stage}
        AlarmDescription: "En eller flera Lambda-funktioner har kastat fel"
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: ${self:service}-${self:provider.stage}-fetchMatches
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        AlarmActions:
          - !Ref AlarmTopic

    # Larm: DLQ har meddelanden (misslyckade events)
    DLQAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-dlq-messages-${self:provider.stage}
        AlarmDescription: "logPrediction har misslyckats - meddelanden i DLQ"
        Namespace: AWS/SQS
        MetricName: ApproximateNumberOfMessagesVisible
        Dimensions:
          - Name: QueueName
            Value: !GetAtt LogPredictionDLQ.QueueName
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        AlarmActions:
          - !Ref AlarmTopic
