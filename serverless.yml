# ==============================================================
# Allsvenskan Predictor - Serverless Framework Configuration
#
# Infrastruktur och deployment-konfiguration för hela projektet.
# Deployar till AWS med DynamoDB, Lambda, API Gateway, EventBridge.
#
# Deploy: npx serverless deploy
# Remove: npx serverless remove
# ==============================================================

# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: sarapersson
# "service" is the name of this project. This will also be added to your AWS resource names.
service: allsvenskan-predictor

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-north-1
  stage: ${opt:stage, 'dev'}  # Kan overridas med --stage prod
  timeout: 10                  # Default timeout för alla Lambdas (sekunder)
  memorySize: 256              # Default minne för alla Lambdas (MB)

  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - x-api-key
      allowedMethods:
        - GET
        - POST
        - OPTIONS
    authorizers:
      apiKeyAuthorizer:
        type: request
        functionName: authorizer
        enableSimpleResponses: true
        payloadVersion: "2.0"
        identitySource: $request.header.x-api-key

  environment:
    MATCHES_TABLE: ${self:service}-matches-${self:provider.stage}
    PREDICTIONS_TABLE: ${self:service}-predictions-${self:provider.stage}
    API_KEY: ${self:custom.apiKey}

  iam:
    role:
      statements:
        # DynamoDB-åtkomst (båda tabellerna)
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:BatchWriteItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:UpdateItem
          Resource:
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MATCHES_TABLE}
            - arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PREDICTIONS_TABLE}
        # EventBridge-åtkomst (begränsad till vår bus)
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - arn:aws:events:${self:provider.region}:*:event-bus/allsvenskan-prediction-bus

custom:
  apiKey: ${ssm:/allsvenskan-predictor/${self:provider.stage}/api-key}

# ==============================================================
# Functions
# ==============================================================

functions:
  # --- Auth ---
  authorizer:
    handler: src/handlers/authorizer.handler

  # --- API Endpoints ---
  getMatches:
    handler: src/handlers/getMatches.handler
    events:
      - httpApi:
          path: /matches
          method: get
          authorizer:
            name: apiKeyAuthorizer

  createPrediction:
    handler: src/handlers/createPrediction.handler
    events:
      - httpApi:
          path: /predictions
          method: post
          authorizer:
            name: apiKeyAuthorizer

  getPredictions:
    handler: src/handlers/getPredictions.handler
    events:
      - httpApi:
          path: /predictions
          method: get
          authorizer:
            name: apiKeyAuthorizer

  # --- Scheduled Jobs ---
  fetchMatches:
    handler: src/handlers/fetchMatches.handler
    timeout: 60  # Behöver mer tid - hämtar 30 omgångar från externt API
    events:
      - schedule:
          rate: rate(1 day)
          enabled: true
          description: "Fetch latest match data from TheSportsDB"

  calculateScores:
    handler: src/handlers/calculateScores.handler
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
          description: "Calculate points for unscored predictions"

  # --- Event-driven ---
  logPrediction:
    handler: src/handlers/logPrediction.handler
    events:
      - eventBridge:
          eventBus: allsvenskan-prediction-bus
          pattern:
            source:
              - "allsvenskan.predictions"
            detail-type:
              - "PredictionCreated"

# ==============================================================
# Resources (CloudFormation)
# ==============================================================

resources:
  Resources:
    # DynamoDB-tabell för matcher
    MatchesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MATCHES_TABLE}
        AttributeDefinitions:
          - AttributeName: matchId
            AttributeType: S
        KeySchema:
          - AttributeName: matchId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # DynamoDB-tabell för tips
    PredictionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PREDICTIONS_TABLE}
        AttributeDefinitions:
          - AttributeName: predictionId
            AttributeType: S
        KeySchema:
          - AttributeName: predictionId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
